<!DOCTYPE html>
<!--VERSION 2.6-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Transit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

    <!-- iOS / Safari Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <nav class="navbar">
        <div class="close-icon">&times;</div>
    </nav>
    <div class="container">
        <div class="header-info">
            <div class="header-title">Metro Transit</div>
            <div class="header-desc">Show operator your ticket</div>
        </div>
        <div class="circle-wrapper">
            <div class="circle"></div>
            <div class="middle-circle"></div>
            <div class="inner-circle">
                <img src="goto.png" alt="GoTo" class="circle-logo">
            </div>
        </div>
        <div id="clock" contenteditable="true" spellcheck="false">--:--:-- --</div>
        <div class="card">
            <div class="card-title">Adult Non-Rush Hour</div>
            <div class="card-desc">Minneapolis/ St.Paul Metro Area</div>
            <div class="card-footer" id="card-footer">Expires --</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
